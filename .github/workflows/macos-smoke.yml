name: macOS Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  startup-smoke:
    runs-on: macos-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r app/requirements.txt

      - name: Verify launcher script syntax
        run: bash -n run_oscimorph.sh

      - name: Run macOS startup smoke test
        env:
          PYTHONPATH: app/src
          OSCIMORPH_SKIP_STARTUP: "1"
        run: python app/scripts/smoke_startup.py
